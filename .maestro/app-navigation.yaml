appId: com.rentalvoice.app
---
# App Navigation Test
# Verifies all tab navigation works without crashing

- launchApp:
    clearState: true

# Wait for the app to fully load
- waitForAnimationToEnd

# The app should show either the onboarding/login or the main inbox
- assertVisible:
    id: ".*"
    timeout: 15000

# --- Test Tab Switching ---

# Tap Settings tab
- tapOn:
    text: "Settings"

- waitForAnimationToEnd

- assertVisible:
    text: "Settings"

# Tap Calendar tab
- tapOn:
    text: "Calendar"

- waitForAnimationToEnd

# Tap Inbox tab (back to home)
- tapOn:
    text: "Inbox"

- waitForAnimationToEnd
