appId: com.rentalvoice.app
---
# Settings Screen Test
# Verifies settings page loads and all sections are accessible

- launchApp

- waitForAnimationToEnd

# Navigate to Settings
- tapOn:
    text: "Settings"

- waitForAnimationToEnd

# Verify key setting sections exist by scrolling through
- assertVisible:
    text: "Settings"

# Scroll down to find Language settings
- scrollUntilVisible:
    element:
      text: ".*Language.*|.*Privacy.*"
    direction: DOWN
    timeout: 10000

# Tap Language or Privacy section
- tapOn:
    text: ".*Language.*"

- waitForAnimationToEnd

# After tapping, verify the Language Settings screen loaded
- assertVisible:
    text: ".*Language.*|.*Cultural.*"
    timeout: 5000

# Go back
- tapOn:
    text: ".*Back.*"
    optional: true

- back
