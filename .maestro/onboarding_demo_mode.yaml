appId: com.rentalvoice.app
---
# Flow 1: Auth explainer -> demo mode -> inbox
# `npm run maestro:demo` deep-links the booted simulator into the local dev client first.

# Step 0: Auth explainer
- assertVisible: "Your account comes first"
- assertVisible:
    id: "auth-explainer-try-demo"

# Enter Demo Mode
- tapOn:
    id: "auth-explainer-try-demo"

# Wait for animations and data load
- waitForAnimationToEnd

# Verify inbox loaded (search bar is visible)
- assertVisible:
    id: "inbox-search"

# Verify we see the "Inbox" header
- assertVisible: "Inbox"
