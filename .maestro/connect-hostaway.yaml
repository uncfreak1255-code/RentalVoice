appId: com.rentalvoice.app
---
# Hostaway Onboarding Test
# Tests connecting a Hostaway account during first-run setup

- launchApp:
    clearState: true

# Wait for app to fully load
- waitForAnimationToEnd

# Navigate to Settings to connect Hostaway
- tapOn:
    text: "Settings"

- waitForAnimationToEnd

# Look for the Hostaway/Account connection option
- scrollUntilVisible:
    element:
      text: ".*Hostaway.*|.*Account.*|.*Connect.*"
    direction: DOWN
    timeout: 10000

# Tap on the connection option
- tapOn:
    text: ".*Hostaway.*|.*Account.*|.*Connect.*"

- waitForAnimationToEnd

# The account ID and API key fields should be visible
- assertVisible:
    text: ".*Account.*|.*ID.*"
    timeout: 5000
