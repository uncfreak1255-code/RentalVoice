name: Pre-release safety gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  safety-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create pre-release checkpoint
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_BUCKET: ${{ secrets.BACKUP_BUCKET }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          bash ops/checkpoint/create-checkpoint.sh --checkpoint-id pre-release-${{ github.run_id }}

      - name: Verify pre-release checkpoint
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          bash ops/checkpoint/verify-checkpoint.sh --checkpoint-id pre-release-${{ github.run_id }}

      - name: Dry-run rollback script
        run: |
          bash ops/rollback/fast-rollback.sh --checkpoint-id pre-release-${{ github.run_id }}
