name: Feature request
description: Propose a concrete improvement with user impact.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: problem
    attributes:
      label: Problem
      description: What real user or operator problem does this solve?
      placeholder: Demo onboarding still hides the real value until the second step.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Keep it concrete.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What should we avoid doing instead?
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Link screenshots, issues, user reports, or metrics if you have them.
