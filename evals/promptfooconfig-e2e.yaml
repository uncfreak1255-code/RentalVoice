# Rental Voice — End-to-End Eval with Semantic Retrieval
# Compares raw Gemini vs Gemini + semantic voice examples
# Run: GOOGLE_API_KEY=<key> SUPABASE_SERVICE_ROLE_KEY=<key> promptfoo eval --config evals/promptfooconfig-e2e.yaml

description: "Rental Voice E2E Eval — Semantic vs Baseline"

prompts:
  - id: file://prompts/combined.txt
    label: "rental-voice-v2-detail-mirroring"

providers:
  # Baseline: raw Gemini, no semantic examples
  - id: google:gemini-2.0-flash
    label: "baseline (no examples)"
    config:
      generationConfig:
        maxOutputTokens: 600
        temperature: 0.7

  # E2E: Gemini + semantic voice examples from pgvector
  - id: file://semantic-provider.mjs
    label: "semantic (pgvector examples)"

tests: file://test-cases.yaml

defaultTest:
  options:
    provider:
      text:
        id: google:gemini-2.0-flash

outputPath: results/eval-e2e-latest.json
